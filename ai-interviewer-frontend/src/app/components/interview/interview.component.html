<div class="interview-container">
    <div class="chat-wrapper">
        <div class="chat-header">
            <div class="header-left">
                <h2>Build Your Skills</h2>
                <span class="mode-badge" *ngIf="isCommunicationMode">Communication Practice</span>
            </div>
            <button class="end-btn" (click)="finishInterview()">Exit</button>
        </div>

        <div class="messages-list">
            <!-- Chat History -->
            <div *ngFor="let msg of messages"
                [ngClass]="{'ai-msg': msg.sender === 'AI', 'user-msg': msg.sender === 'USER'}" class="message">
                <div class="bubble">
                    {{ msg.text }}
                    <span class="time">{{ msg.timestamp | date:'shortTime' }}</span>
                </div>
            </div>

            <!-- AI Thinking State -->
            <div *ngIf="aiThinking" class="message ai-msg">
                <div class="bubble ai-thinking">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span>AI is thinking...</span>
                </div>
            </div>
        </div>

        <!-- User Input Section -->
        <div class="input-area" *ngIf="!isFinished">
            <div class="error-msg" *ngIf="inputError">{{ inputError }}</div>

            <!-- Normal Input Box -->
            <div class="input-box" *ngIf="!isRecording" [class.disabled-box]="aiThinking">
                <textarea [(ngModel)]="currentAnswer" placeholder="Type your answer..." (keyup.enter)="submitAnswer()"
                    [disabled]="aiThinking" rows="1"></textarea>

                <div class="input-actions">
                    <!-- Mic button -->
                    <button class="mic-btn" (click)="startVoice()" [disabled]="aiThinking" title="Speak your answer">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </button>

                    <!-- Send button -->
                    <button (click)="submitAnswer()" [disabled]="!currentAnswer.trim() || aiThinking" class="send-btn">
                        <span class="send-icon">→</span>
                    </button>
                </div>
            </div>

            <!-- Voice Recording Mode -->
            <div class="voice-recording-box" *ngIf="isRecording">
                <!-- Cancel -->
                <button class="voice-cancel-btn" (click)="cancelVoice()" title="Cancel">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>

                <!-- Waveform -->
                <div class="waveform-container">
                    <div *ngFor="let bar of waveformBars; let i = index" class="waveform-bar"
                        [style.height.px]="6 + bar * 30" [style.opacity]="0.4 + bar * 0.6">
                    </div>
                </div>

                <!-- Confirm -->
                <button class="voice-confirm-btn" (click)="confirmVoice()" title="Done – use this answer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </button>
            </div>

            <!-- Live transcript preview -->
            <div class="transcript-preview" *ngIf="isRecording && currentAnswer">
                <span class="pulse-dot"></span>
                <span class="transcript-text">{{ currentAnswer }}</span>
            </div>
            <div class="transcript-preview listening-text" *ngIf="isRecording && !currentAnswer">
                <span class="pulse-dot"></span>
                <span>Listening for your answer...</span>
            </div>

            <span class="hint" *ngIf="!isRecording">Please type mostly in English.<br>
                Do not use other languages. Press mic 🎤 or type your answer.</span>
        </div>
    </div>
</div>
