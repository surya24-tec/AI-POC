spring.application.name=ai-interviewer-backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/ai_interviewer?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.show-sql=true
spring.jpa.generate-ddl=true

# Fix #7: Dynamic port — uses PORT env variable (for Render) or defaults to 8081
server.port=${PORT:8081}

# Fix #10: Gemini API Configuration — Enter key here directly:
# Note: Do not use ${GEMINI_API_KEY} variable wrapper if you want to avoid stale system variables overriding this file
gemini.api.key=AIzaSyDE69Zv1j5hDvZrnXcOBN66pfuwiAWG0fE

# Gemini model — available: gemini-2.0-flash, gemini-2.0-flash-001, gemini-2.5-flash, gemini-2.5-pro
# Note: gemini-1.5-flash-latest is REMOVED by Google (404)
gemini.api.model=gemini-2.5-flash

 Email Configuration
 Enter your SMTP credentials here to enable emails
