spring.application.name=ai-interviewer-backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/ai_interviewer?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.show-sql=true
spring.jpa.generate-ddl=true

# Fix #7: Dynamic port — uses PORT env variable (for Render) or defaults to 8081
server.port=${PORT:8081}

# Fix #10: Gemini API Configuration — uses env variable with fallback
# Set GEMINI_API_KEY environment variable in production to avoid exposing the key
#gemini.api.key=${GEMINI_API_KEY:AIzaSyDgaCNwXgVxBqMP2W1CtUQ-77KdQGZ56_8}
gemini.api.key=${GEMINI_API_KEY:AIzaSyBrEkfBZUpOaAcpYELq944QDD0crrlUIpI}

# Gemini model — available: gemini-2.0-flash, gemini-2.0-flash-001, gemini-2.5-flash, gemini-2.5-pro
# Note: gemini-1.5-flash-latest is REMOVED by Google (404)
gemini.api.model=gemini-2.5-flash
